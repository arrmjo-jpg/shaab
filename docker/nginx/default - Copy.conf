# ── AlphaCMS edge nginx (behind Cloudflare) ────────────────────────────────────
# Two origins: the public site (Next.js) and the API (Laravel). Adjust server_name to your
# domains. TLS is terminated at Cloudflare; use a Cloudflare Origin Certificate on 443 in prod
# (this file listens on 80 — front it with CF "Full (strict)"). The app sets CSP/HSTS/etc., so
# nginx does NOT duplicate security headers (avoids conflicts).

# Cloudflare → real client IP (keep this list current: https://www.cloudflare.com/ips/).
# set_real_ip_from 173.245.48.0/20; ... (add CF ranges) ; real_ip_header CF-Connecting-IP;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript application/xml
           application/xml+rss application/rss+xml image/svg+xml text/xml application/manifest+json;
# Brotli is provided by Cloudflare at the edge; origin gzip is the fallback.

proxy_http_version 1.1;

# ── Public site → Next.js standalone (example.com / www) ──────────────────────
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 2M;            # the public site itself takes no large uploads

    # Next build assets are content-hashed → cache hard at the edge + browser.
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;       # WebSocket-ready (future Reverb)
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 60s;
    }
}

# ── API → Laravel front controller (api.example.com) ─────────────────────────
server {
    listen 80;
    server_name api.example.com;        # adjust
    client_max_body_size 512M;          # admin media uploads (video/images)

    # Uploaded media (local 'public' disk) — served straight from the shared volume.
    location /storage/ {
        alias /srv/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Everything else is the Laravel front controller — no app code needed on nginx, every
    # request is dispatched through public/index.php on php-fpm.
    location / {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";    # mitigate httpoxy
        fastcgi_read_timeout 120s;
    }
}
