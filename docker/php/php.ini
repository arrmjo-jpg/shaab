; ── AlphaCMS production PHP settings ──────────────────────────────────────────
; Media uploads (video/images) need generous limits; the API enforces real per-field rules.
memory_limit = 512M
upload_max_filesize = 512M
post_max_size = 520M
max_execution_time = 120
max_input_time = 120

; OPcache — production (no timestamp revalidation; warm once per deploy/restart).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
realpath_cache_size = 4096k
realpath_cache_ttl = 600

expose_php = Off
date.timezone = UTC
