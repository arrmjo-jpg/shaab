# ── AlphaCMS — Coolify Production ─────────────────────────

x-backend-common: &backend-common
  image: alphacms-backend:latest
  restart: unless-stopped
  volumes:
    - media:/var/www/html/storage/app/public

services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - .:/var/www/html:ro
      - media:/srv/media:ro
    expose:
      - "80"
    networks:
      - default
      - coolify

    labels:
      - traefik.enable=true

      # -------- Main Website --------
      - traefik.http.routers.harer.rule=Host(`harer.store`) || Host(`www.harer.store`)
      - traefik.http.routers.harer.entrypoints=https
      - traefik.http.routers.harer.tls=true
      - traefik.http.routers.harer.tls.certresolver=letsencrypt
      - traefik.http.routers.harer.service=harer
      - traefik.http.services.harer.loadbalancer.server.port=80
  

      # -------- API --------
      - traefik.http.routers.api.rule=Host(`api.harer.store`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.routers.api.service=harer
      - traefik.http.services.api.loadbalancer.server.port=80
      - traefik.docker.network=coolify

  admin:
  build:
    context: ./admin-frontend
    dockerfile: Dockerfile
    args:
      VITE_API_BASE_URL: https://api.harer.store/api/v1

  restart: unless-stopped

  expose:
    - "80"

  labels:
    - traefik.enable=true
    - traefik.http.routers.admin.rule=Host(`admin.harer.store`)
    - traefik.http.routers.admin.entrypoints=https
    - traefik.http.routers.admin.tls=true
    - traefik.http.routers.admin.tls.certresolver=letsencrypt
    - traefik.http.routers.admin.service=admin
    - traefik.http.services.admin.loadbalancer.server.port=80

  backend:
    <<: *backend-common
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    expose:
      - "9000"
    depends_on:
      - redis
      - meilisearch

  worker:
    <<: *backend-common
    command: php artisan queue:work redis --queue=default,notifications,mail,search,sitemap,ai,analytics --tries=3 --backoff=10 --sleep=1 --max-time=3600
    depends_on:
      - redis
 

  worker-media:
    <<: *backend-common
    command: php artisan queue:work redis-media --queue=media --tries=2 --timeout=2520 --sleep=2 --max-time=3600
    depends_on:
      - redis

  scheduler:
    <<: *backend-common
    command: php artisan schedule:work
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CLIENT: ${CLIENT:-shaabjo}
    image: alphacms-frontend:${CLIENT:-shaabjo}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
      SITE_URL: ${SITE_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - frontend-cache:/app/.next/cache
    expose:
      - "3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.16
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    expose:
      - "7700"
    volumes:
      - meili-data:/meili_data
networks:
  coolify:
    external: true
volumes:
  media:
  frontend-cache:
  meili-data:
  redis-data: