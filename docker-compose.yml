# ── AlphaCMS — Coolify Production ─────────────────────────

x-backend-common: &backend-common
  image: alphacms-backend:latest
  restart: unless-stopped
  volumes:
    - media:/var/www/html/storage/app/public

services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - .:/var/www/html:ro
      - media:/srv/media:ro
    expose:
      - "80"

  backend:
    <<: *backend-common
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    expose:
      - "9000"
    depends_on:
      - redis
      - meilisearch

  worker:
    <<: *backend-common
    command: php artisan queue:work redis --queue=default,notifications,mail,search,sitemap,ai,analytics --tries=3 --backoff=10 --sleep=1 --max-time=3600
    depends_on:
      - redis
 

  worker-media:
    <<: *backend-common
    command: php artisan queue:work redis-media --queue=media --tries=2 --timeout=2520 --sleep=2 --max-time=3600
    depends_on:
      - redis

  scheduler:
    <<: *backend-common
    command: php artisan schedule:work
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CLIENT: ${CLIENT:-shaabjo}
    image: alphacms-frontend:${CLIENT:-shaabjo}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
      SITE_URL: ${SITE_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - frontend-cache:/app/.next/cache
    expose:
      - "3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.16
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    expose:
      - "7700"
    volumes:
      - meili-data:/meili_data

volumes:
  media:
  frontend-cache:
  meili-data:
  redis-data: