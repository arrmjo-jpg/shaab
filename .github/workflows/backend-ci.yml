name: Backend CI

# Deterministic validation for the Laravel API.
#
# No external services are needed: phpunit.xml pins the test environment to sqlite :memory:,
# the array cache store (tags-capable), the Scout "collection" driver, the sync queue, and
# empty AWS/media-mirror creds — so the suite is fully self-contained on the runner.
# Reproducibility: fresh checkout + `composer install` from the committed composer.lock.
# Each logical check is its own named step for a clear failure surface.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: composer · php -l · pint · pest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (clean tree)
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # gd is the default media image_driver (config/media-library.php); imagick covers
          # IMAGE_DRIVER=imagick deployments. Both ship WebP support on ubuntu runners.
          extensions: mbstring, intl, pdo_sqlite, sqlite3, gd, imagick, exif, bcmath, fileinfo, zip, dom, xml, curl, tokenizer
          coverage: none
          tools: composer:v2

      - name: Validate composer manifest + lock
        run: composer validate --no-check-publish

      - name: Prepare environment (.env)
        run: cp .env.example .env

      - name: Install dependencies (composer — lockfile-pinned)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: PHP syntax check (php -l — all first-party source)
        run: |
          set -euo pipefail
          find app bootstrap config database routes tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Code style (Pint — check only, no fixes)
        run: vendor/bin/pint --test

      - name: Tests (Pest — sqlite :memory:, array cache)
        run: php artisan test
