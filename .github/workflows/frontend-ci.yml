name: Frontend CI

# Deterministic, COLD-build validation for the Next.js public frontend.
#
# Reproducibility guarantees:
#   * Ephemeral runner + fresh `actions/checkout` → no local state.
#   * `npm ci` installs exactly from the committed package-lock.json (no drift).
#   * Only the npm download cache (~/.npm, keyed by the lockfile) is cached — never
#     `.next` or `node_modules`. An explicit `.next` wipe before the build makes the
#     "no stale build cache" guarantee visible and auditable.
# Each logical check is its own named step, so a failure surfaces unambiguously.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: validate · typecheck · lint · cold build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (clean tree)
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci — lockfile-pinned)
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint (next lint)
        run: npm run lint

      - name: Wipe .next (force a cold build — no stale cache reuse)
        run: |
          rm -rf .next
          echo "Removed .next — building from a clean state."

      - name: Build (next build)
        run: npm run build
